<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vite App</title>
		<!-- KaTeX CSS for math rendering -->
		<link
			rel="stylesheet"
			href="https://fastly.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
		<link
			rel="stylesheet"
			href="https://fastly.jsdelivr.net/npm/@wooorm/starry-night@3.9.0/style/both.min.css" />
		<style>
			body {
				background: black;
			}
			#loading {
				background: linear-gradient(
					90deg,
					#aaaaaa64 40%,
					#bff 50%,
					#aaaaaa63 60%
				);
				background-size: 200% 100%;
				border-radius: 5px;
				animation:
					slideWidth 2s ease-out infinite,
					slideBg 2.4s infinite linear;
				margin: 0;
				padding: 0.5rem;
				box-sizing: border-box;
			}
			@keyframes slideWidth {
				0% {
					width: 12em;
				}
				100% {
					width: 100%;
				}
			}

			@keyframes slideBg {
				0% {
					background-position: 100% 0;
				}
				100% {
					background-position: -100% 0;
				}
			}
		</style>
	</head>
	<body data-bs-theme="dark">
		<div id="loading" style="">Loading...</div>
		<div id="app"></div>
		<script type="module" src="/src/main.ts" async></script>
		<script></script>
	</body>
</html>
